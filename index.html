<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>運動紀錄資料面板</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- PapaParse for CSV parsing -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    * {
      font-family: 'Noto Sans TC', 'Segoe UI', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #e8f0fe 0%, #f0f4ff 50%, #eef2ff 100%);
      min-height: 100vh;
    }

    /* Loader */
    .loader {
      border-top-color: #4f46e5;
      animation: spinner 1s linear infinite;
    }

    @keyframes spinner {
      100% {
        transform: rotate(360deg);
      }
    }

    /* Scrollbar */
    .custom-scrollbar::-webkit-scrollbar {
      width: 5px;
      height: 5px;
    }

    .custom-scrollbar::-webkit-scrollbar-track {
      background: #f8fafc;
    }

    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: #c7d2fe;
      border-radius: 10px;
    }

    .custom-scrollbar::-webkit-scrollbar-thumb:hover {
      background: #818cf8;
    }

    /* Filter inputs */
    .filter-input {
      border: 1.5px solid #e0e7ff;
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 12px;
      background: white;
      color: #374151;
      transition: all 0.2s;
      outline: none;
    }

    .filter-input:focus {
      border-color: #6366f1;
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.12);
    }

    /* Table row hover */
    tbody tr {
      transition: background 0.15s;
    }

    /* Card glow hover */
    .stat-card {
      transition: all 0.2s ease;
    }

    .stat-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(99, 102, 241, 0.12);
    }

    /* Active filter tag */
    .active-filter-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: #eef2ff;
      color: #4338ca;
      border: 1px solid #c7d2fe;
      border-radius: 20px;
      padding: 2px 10px;
      font-size: 11px;
      font-weight: 600;
    }
  </style>
</head>

<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    const SHEET_URL = 'https://docs.google.com/spreadsheets/d/1DNNnnqJhlDD2jhF3TLNUZt3Syfi7kzCIgGXH342FlWw/gviz/tq?tqx=out:csv&sheet=log';
    const MAPPING_SHEET_URL = 'https://docs.google.com/spreadsheets/d/1DNNnnqJhlDD2jhF3TLNUZt3Syfi7kzCIgGXH342FlWw/gviz/tq?tqx=out:csv&sheet=暱稱id';
    // ★ 請將下方 URL 換成您的 Google 表單連結 ★
    const FORM_URL = 'https://docs.google.com/spreadsheets/d/1DNNnnqJhlDD2jhF3TLNUZt3Syfi7kzCIgGXH342FlWw/edit?gid=0#gid=0';

    function checkAbnormal(sport, distance, time) {
      if (!sport) return { isTooFast: false, reason: "" };
      let isTooFast = false, reason = "";
      const s = sport.trim();
      if (s.includes('跑')) {
        const t = distance * 4;
        if (time < t) { isTooFast = true; reason = `耗時低於建議 (≥${t.toFixed(1)} 分)`; }
      } else if (s.includes('腳踏車') || s.includes('自行車') || s.includes('單車')) {
        const t = distance * 1.5;
        if (time < t) { isTooFast = true; reason = `耗時低於建議 (≥${t.toFixed(1)} 分)`; }
      } else if (s.includes('游') || s.includes('水')) {
        const t = distance * 15;
        if (time < t) { isTooFast = true; reason = `耗時低於建議 (≥${t.toFixed(1)} 分)`; }
      } else if (s.includes('健走') || s.includes('走') || s.includes('步')) {
        const t = distance * 7;
        if (time < t) { isTooFast = true; reason = `耗時低於建議 (≥${t.toFixed(1)} 分)`; }
      }
      return { isTooFast, reason };
    }

    function extractNumber(str) {
      if (!str) return 0;
      const num = parseFloat(String(str).replace(/[^\d.]/g, ''));
      return isNaN(num) ? 0 : num;
    }

    function getSportColorClass(sport) {
      if (!sport) return "bg-gray-100 text-gray-700";
      const s = sport.trim();
      if (s.includes('跑')) return "bg-emerald-100 text-emerald-800 border border-emerald-200";
      if (s.includes('腳踏車') || s.includes('自行車') || s.includes('單車')) return "bg-violet-100 text-violet-800 border border-violet-200";
      if (s.includes('游') || s.includes('水')) return "bg-sky-100 text-sky-800 border border-sky-200";
      if (s.includes('健走') || s.includes('走') || s.includes('步')) return "bg-amber-100 text-amber-800 border border-amber-200";
      return "bg-gray-100 text-gray-700 border border-gray-200";
    }

    function getMonthString(dateStr) {
      if (!dateStr) return null;
      const match = String(dateStr).match(/(\d{4})[-\/](\d{1,2})/);
      if (match) return `${match[1]}-${match[2].padStart(2, '0')}`;
      return null;
    }

    function parseDateToComparable(dateStr) {
      if (!dateStr) return null;
      const match = String(dateStr).match(/(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})/);
      if (match) return `${match[1]}-${match[2].padStart(2, '0')}-${match[3].padStart(2, '0')}`;
      const mm = String(dateStr).match(/(\d{4})[\/\-](\d{1,2})/);
      if (mm) return `${mm[1]}-${mm[2].padStart(2, '0')}-01`;
      return null;
    }

    function App() {
      const [records, setRecords] = useState([]);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);
      const [filter, setFilter] = useState('all');
      const [searchTerm, setSearchTerm] = useState('');
      const [sportFilter, setSportFilter] = useState('all');
      const [sortConfig, setSortConfig] = useState({ key: 'updateDate', direction: 'descending' });
      const [activeTab, setActiveTab] = useState('details');
      const [dateStart, setDateStart] = useState('');
      const [dateEnd, setDateEnd] = useState('');

      const sportOptions = useMemo(() => Array.from(new Set(records.map(r => r.sport).filter(Boolean))), [records]);

      const requestSort = (key) => {
        let direction = 'ascending';
        if (sortConfig.key === key && sortConfig.direction === 'ascending') direction = 'descending';
        setSortConfig({ key, direction });
      };

      const getSortIndicator = (key) => {
        if (sortConfig.key === key) {
          return sortConfig.direction === 'ascending'
            ? <span className="ml-1 text-indigo-500 font-bold">↑</span>
            : <span className="ml-1 text-indigo-500 font-bold">↓</span>;
        }
        return <span className="ml-1 text-gray-300 opacity-0 group-hover:opacity-100 transition-opacity">↕</span>;
      };

      const fetchData = async () => {
        setLoading(true); setError(null);
        try {
          const [logRes, mapRes] = await Promise.all([fetch(SHEET_URL), fetch(MAPPING_SHEET_URL)]);
          if (!logRes.ok || !mapRes.ok) throw new Error("無法讀取資料，請確認 Google 試算表權限。");
          const csvText = await logRes.text();
          const mapCsvText = await mapRes.text();
          if (csvText.includes('<!DOCTYPE html>') || mapCsvText.includes('<!DOCTYPE html>'))
            throw new Error("存取被拒絕！請確保試算表已設為「知道連結的使用者皆可查看」。");

          const idMap = {};
          Papa.parse(mapCsvText, {
            complete: (r) => {
              const d = r.data;
              if (d.length > 1) {
                const h = d[0];
                let iIdx = h.findIndex(x => /id/i.test(x)); if (iIdx === -1) iIdx = 0;
                let nIdx = h.findIndex(x => /姓名|名稱|暱稱|name/i.test(x)); if (nIdx === -1) nIdx = 1;
                for (let i = 1; i < d.length; i++) { if (d[i] && d[i][iIdx]) idMap[String(d[i][iIdx]).trim()] = String(d[i][nIdx] || '').trim(); }
              }
            }
          });

          Papa.parse(csvText, {
            complete: (r) => {
              const data = r.data;
              if (data.length < 2) { setRecords([]); setLoading(false); return; }
              const h = data[0];
              let dateIdx = h.findIndex(x => /日期|時間戳記/i.test(x)); if (dateIdx === -1) dateIdx = 0;
              let nIdx = h.findIndex(x => /id|名|user|member/i.test(x)); if (nIdx === -1) nIdx = 1;
              let sIdx = h.findIndex(x => /項目|運動|sport/i.test(x)); if (sIdx === -1) sIdx = 2;
              let dIdx = h.findIndex(x => /距離|km/i.test(x)); if (dIdx === -1) dIdx = 3;
              let upIdx = h.findIndex(x => /上傳/i.test(x)); if (upIdx === -1) upIdx = 4;
              let tIdx = h.findIndex(x => /運動時間|耗時/i.test(x));
              if (tIdx === -1) tIdx = h.findIndex(x => /時間|分/i.test(x) && !/上傳/i.test(x));
              if (tIdx === -1) tIdx = 5;

              const parsed = data.slice(1).map((row, idx) => {
                if (row.length < 4 || (!row[nIdx] && !row[sIdx])) return null;
                const updateDate = row[dateIdx] || '', name = String(row[nIdx] || '').trim() || '未知';
                const realName = idMap[name] || '-', sport = row[sIdx] || '';
                const distanceRaw = row[dIdx] || '', uploadTime = row[upIdx] || '', timeRaw = row[tIdx] || '';
                const distance = extractNumber(distanceRaw), time = extractNumber(timeRaw);
                const { isTooFast, reason } = checkAbnormal(sport, distance, time);
                return { id: idx, updateDate, name, realName, sport, distanceRaw, distance, uploadTime, timeRaw, time, isTooFast, reason };
              }).filter(Boolean);
              setRecords(parsed); setLoading(false);
            }
          });
        } catch (err) { setError(err.message); setLoading(false); }
      };

      useEffect(() => { fetchData(); }, []);

      const applyDateFilter = (arr) => {
        if (dateStart) arr = arr.filter(r => { const d = parseDateToComparable(r.updateDate); return d && d >= dateStart; });
        if (dateEnd) arr = arr.filter(r => { const d = parseDateToComparable(r.updateDate); return d && d <= dateEnd; });
        return arr;
      };

      const filteredRecords = useMemo(() => {
        let result = [...records];
        if (filter === 'abnormal') result = result.filter(r => r.isTooFast);
        if (searchTerm) { const t = searchTerm.toLowerCase(); result = result.filter(r => r.name.toLowerCase().includes(t) || r.realName.toLowerCase().includes(t)); }
        if (sportFilter !== 'all') result = result.filter(r => r.sport === sportFilter);
        result = applyDateFilter(result);
        if (sortConfig.key) {
          result.sort((a, b) => {
            let av = a[sortConfig.key], bv = b[sortConfig.key];
            if (['distance', 'time'].includes(sortConfig.key)) { av = Number(av) || 0; bv = Number(bv) || 0; }
            else if (['updateDate', 'uploadTime'].includes(sortConfig.key)) { av = new Date(av).getTime() || 0; bv = new Date(bv).getTime() || 0; }
            else { av = String(av || ''); bv = String(bv || ''); }
            if (av < bv) return sortConfig.direction === 'ascending' ? -1 : 1;
            if (av > bv) return sortConfig.direction === 'ascending' ? 1 : -1;
            return 0;
          });
        }
        return result;
      }, [records, filter, searchTerm, sportFilter, dateStart, dateEnd, sortConfig]);

      const summaryRecords = useMemo(() => {
        let base = records;
        base = applyDateFilter(base);
        if (searchTerm) { const t = searchTerm.toLowerCase(); base = base.filter(r => r.name.toLowerCase().includes(t) || r.realName.toLowerCase().includes(t)); }
        const map = {};
        base.forEach(r => {
          if (!map[r.name]) map[r.name] = { id: r.name, realName: r.realName, run: 0, bike: 0, swim: 0, walk: 0, total: 0 };
          const d = Number(r.distance) || 0;
          if (r.sport.includes('跑')) map[r.name].run += d;
          else if (r.sport.includes('腳踏車') || r.sport.includes('自行車') || r.sport.includes('單車')) map[r.name].bike += d;
          else if (r.sport.includes('游') || r.sport.includes('水')) map[r.name].swim += d;
          else if (r.sport.includes('健走') || r.sport.includes('走') || r.sport.includes('步')) map[r.name].walk += d;
          map[r.name].total += d;
        });
        return Object.values(map).sort((a, b) => b.total - a.total);
      }, [records, dateStart, dateEnd, searchTerm]);

      useEffect(() => { if (window.lucide) setTimeout(() => window.lucide.createIcons(), 0); }, [filteredRecords, activeTab]);

      const abnormalCount = records.filter(r => r.isTooFast).length;
      const hasDateFilter = dateStart || dateEnd;

      return (
        <div className="min-h-screen p-4 md:p-8">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* ── Header ── */}
            <div className="flex flex-col md:flex-row justify-between items-start md:items-center bg-white/90 backdrop-blur p-5 rounded-2xl shadow border border-indigo-100">
              <div className="flex items-center gap-3">
                <div className="p-2.5 bg-indigo-600 rounded-xl text-white shadow-md">
                  <i data-lucide="activity" className="w-5 h-5"></i>
                </div>
                <div>
                  <h1 className="text-xl font-bold text-gray-800 leading-tight">運動紀錄資料面板</h1>
                  <p className="text-gray-400 text-xs mt-0.5">即時載入 Google 試算表數據</p>
                </div>
              </div>
              <div className="mt-4 md:mt-0 flex items-center gap-2">
                <a href={FORM_URL} target="_blank" rel="noopener noreferrer"
                  className="flex items-center gap-2 px-4 py-2 bg-emerald-500 hover:bg-emerald-600 text-white text-sm rounded-xl transition-all shadow hover:shadow-md">
                  <i data-lucide="clipboard-pen" className="w-4 h-4"></i>
                  表單連結
                </a>
                <button onClick={fetchData} disabled={loading}
                  className="flex items-center gap-2 px-4 py-2 bg-indigo-600 hover:bg-indigo-700 text-white text-sm rounded-xl transition-all shadow hover:shadow-md disabled:opacity-50">
                  <i data-lucide="refresh-cw" className={loading ? "animate-spin w-4 h-4" : "w-4 h-4"}></i>
                  {loading ? '載入中...' : '重新整理'}
                </button>
              </div>
            </div>

            {/* ── Error ── */}
            {error && (
              <div className="bg-red-50 border border-red-200 text-red-700 rounded-2xl p-5 flex items-start gap-3">
                <i data-lucide="alert-circle" className="w-5 h-5 flex-shrink-0 mt-0.5"></i>
                <div>
                  <p className="font-semibold text-sm">載入失敗</p>
                  <p className="text-xs mt-1 text-red-600">{error}</p>
                </div>
              </div>
            )}

            {/* ── Statistics ── */}
            {!error && !loading && (
              <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div className="stat-card bg-white/90 p-5 rounded-2xl shadow border border-indigo-50 flex items-center justify-between">
                  <div>
                    <p className="text-xs font-medium text-gray-400 uppercase tracking-wide">總紀錄筆數</p>
                    <p className="text-3xl font-bold text-gray-800 mt-1">{records.length}</p>
                  </div>
                  <div className="p-3 bg-indigo-50 text-indigo-500 rounded-xl">
                    <i data-lucide="database" className="w-5 h-5"></i>
                  </div>
                </div>
                <div className="stat-card bg-white/90 p-5 rounded-2xl shadow border border-emerald-50 flex items-center justify-between">
                  <div>
                    <p className="text-xs font-medium text-gray-400 uppercase tracking-wide">正常紀錄</p>
                    <p className="text-3xl font-bold text-emerald-600 mt-1">{records.length - abnormalCount}</p>
                  </div>
                  <div className="p-3 bg-emerald-50 text-emerald-500 rounded-xl">
                    <i data-lucide="check-circle" className="w-5 h-5"></i>
                  </div>
                </div>
                <div className="stat-card bg-white/90 p-5 rounded-2xl shadow border border-red-50 flex items-center justify-between">
                  <div>
                    <p className="text-xs font-medium text-gray-400 uppercase tracking-wide">異常 / 過快</p>
                    <p className="text-3xl font-bold text-red-500 mt-1">{abnormalCount}</p>
                  </div>
                  <div className="p-3 bg-red-50 text-red-400 rounded-xl">
                    <i data-lucide="alert-triangle" className="w-5 h-5"></i>
                  </div>
                </div>
              </div>
            )}

            {/* ── Filter & Table ── */}
            {!error && (
              <div className="bg-white/90 rounded-2xl shadow border border-indigo-50 overflow-hidden">

                {/* ─ 篩選區 ─ */}
                <div className="border-b border-gray-100 px-5 pt-4 pb-3 bg-gray-50/70 space-y-3">

                  {/* 第一列：Tabs + 搜尋 + 狀態切換 */}
                  <div className="flex flex-wrap items-center gap-2 justify-between">
                    {/* Tabs */}
                    <div className="flex items-center bg-white border border-indigo-100 p-1 rounded-xl gap-1 shadow-sm">
                      <button onClick={() => setActiveTab('details')}
                        className={`px-4 py-1.5 rounded-lg text-xs font-semibold transition-all whitespace-nowrap ${activeTab === 'details' ? 'bg-indigo-600 text-white shadow' : 'text-gray-500 hover:text-gray-700'}`}>
                        <i data-lucide="list-filter" className="w-3.5 h-3.5 inline-block mr-1 -mt-0.5"></i>明細數據
                      </button>
                      <button onClick={() => setActiveTab('summary')}
                        className={`px-4 py-1.5 rounded-lg text-xs font-semibold transition-all whitespace-nowrap ${activeTab === 'summary' ? 'bg-indigo-600 text-white shadow' : 'text-gray-500 hover:text-gray-700'}`}>
                        <i data-lucide="bar-chart-2" className="w-3.5 h-3.5 inline-block mr-1 -mt-0.5"></i>里程統計
                      </button>
                    </div>

                    <div className="flex flex-wrap items-center gap-2">
                      {/* 搜尋 */}
                      <div className="relative">
                        <div className="absolute inset-y-0 left-0 pl-2.5 flex items-center pointer-events-none">
                          <i data-lucide="search" className="w-3.5 h-3.5 text-gray-400"></i>
                        </div>
                        <input type="text" placeholder="搜尋 ID / 姓名..."
                          className="filter-input pl-8 w-40"
                          value={searchTerm} onChange={e => setSearchTerm(e.target.value)} />
                      </div>

                      {/* 異常篩選（僅明細頁） */}
                      {activeTab === 'details' && (
                        <div className="flex bg-white border border-gray-200 rounded-xl p-0.5 gap-0.5 shadow-sm">
                          <button onClick={() => setFilter('all')}
                            className={`px-3 py-1.5 text-xs rounded-lg font-semibold transition-all ${filter === 'all' ? 'bg-indigo-600 text-white shadow' : 'text-gray-500 hover:text-gray-700'}`}>
                            全部
                          </button>
                          <button onClick={() => setFilter('abnormal')}
                            className={`px-3 py-1.5 text-xs rounded-lg font-semibold transition-all ${filter === 'abnormal' ? 'bg-red-500 text-white shadow' : 'text-gray-500 hover:text-gray-700'}`}>
                            ⚠ 異常
                          </button>
                        </div>
                      )}
                    </div>
                  </div>

                  {/* 第二列：月份 + 運動項目 + 日期區間 */}
                  <div className="flex flex-wrap items-center gap-2">
                    <span className="text-xs text-gray-400 font-medium">篩選：</span>

                    {/* 運動項目（僅明細頁） */}
                    {activeTab === 'details' && (
                      <select className="filter-input" value={sportFilter} onChange={e => setSportFilter(e.target.value)}>
                        <option value="all">🏃 所有項目</option>
                        {sportOptions.map(s => <option key={s} value={s}>{s}</option>)}
                      </select>
                    )}

                    {/* 日期區間 */}
                    <div className="flex items-center gap-1.5">
                      <span className="text-xs text-gray-400 whitespace-nowrap">區間：</span>
                      <input type="date" className="filter-input" value={dateStart} onChange={e => setDateStart(e.target.value)} title="開始日期" />
                      <span className="text-gray-300 text-sm font-light">—</span>
                      <input type="date" className="filter-input" value={dateEnd} onChange={e => setDateEnd(e.target.value)} title="結束日期" />
                      {hasDateFilter && (
                        <button onClick={() => { setDateStart(''); setDateEnd(''); }}
                          className="text-xs text-indigo-500 hover:text-indigo-700 border border-indigo-200 hover:border-indigo-400 rounded-lg px-2.5 py-1.5 bg-indigo-50 hover:bg-indigo-100 transition-all whitespace-nowrap font-medium">
                          ✕ 清除
                        </button>
                      )}
                    </div>

                    {/* 目前篩選結果數 */}
                    {!loading && (
                      <span className="ml-auto text-xs text-gray-400">
                        顯示 <span className="font-bold text-indigo-600">{activeTab === 'details' ? filteredRecords.length : summaryRecords.length}</span> 筆
                      </span>
                    )}
                  </div>
                </div>

                {/* ─ 表格 ─ */}
                <div className="overflow-auto max-h-[62vh] relative w-full custom-scrollbar">
                  {activeTab === 'details' ? (
                    <table className="w-full text-left border-collapse min-w-max">
                      <thead className="sticky top-0 z-20">
                        <tr className="bg-indigo-50/80 text-gray-600 text-xs uppercase tracking-wide border-b border-indigo-100">
                          <th className="px-4 py-3 font-semibold cursor-pointer hover:bg-indigo-100/60 select-none group" onClick={() => requestSort('updateDate')}>更新日期{getSortIndicator('updateDate')}</th>
                          <th className="px-4 py-3 font-semibold cursor-pointer hover:bg-indigo-100/60 select-none group" onClick={() => requestSort('name')}>ID{getSortIndicator('name')}</th>
                          <th className="px-4 py-3 font-semibold cursor-pointer hover:bg-indigo-100/60 select-none group" onClick={() => requestSort('realName')}>姓名{getSortIndicator('realName')}</th>
                          <th className="px-4 py-3 font-semibold cursor-pointer hover:bg-indigo-100/60 select-none group" onClick={() => requestSort('sport')}>項目{getSortIndicator('sport')}</th>
                          <th className="px-4 py-3 font-semibold text-right cursor-pointer hover:bg-indigo-100/60 select-none group" onClick={() => requestSort('distance')}>距離{getSortIndicator('distance')}</th>
                          <th className="px-4 py-3 font-semibold text-right cursor-pointer hover:bg-indigo-100/60 select-none group" onClick={() => requestSort('time')}>運動時間{getSortIndicator('time')}</th>
                          <th className="px-4 py-3 font-semibold min-w-[160px]">系統判定</th>
                        </tr>
                      </thead>
                      <tbody>
                        {loading ? (
                          <tr><td colSpan="7" className="px-6 py-20 text-center text-gray-400">
                            <div className="flex flex-col items-center gap-3">
                              <div className="loader ease-linear rounded-full border-4 border-gray-200 border-t-indigo-500 h-10 w-10"></div>
                              <p className="text-sm">資料讀取中...</p>
                            </div>
                          </td></tr>
                        ) : filteredRecords.length === 0 ? (
                          <tr><td colSpan="7" className="px-6 py-20 text-center text-gray-400">
                            <i data-lucide="inbox" className="h-10 w-10 text-gray-300 mx-auto mb-3"></i>
                            <p className="text-sm">無符合條件的紀錄</p>
                          </td></tr>
                        ) : filteredRecords.map((r, i) => (
                          <tr key={r.id} className={`border-b border-gray-50 hover:bg-indigo-50/40 ${r.isTooFast ? 'bg-red-50/40' : i % 2 === 1 ? 'bg-gray-50/40' : 'bg-white'}`}>
                            <td className="px-4 py-3 text-gray-400 text-xs font-mono whitespace-nowrap">{r.updateDate}</td>
                            <td className="px-4 py-3 font-semibold text-gray-700 text-sm">{r.name}</td>
                            <td className="px-4 py-3 font-semibold text-indigo-600 text-sm">{r.realName}</td>
                            <td className="px-4 py-3">
                              <span className={`px-2.5 py-0.5 rounded-full text-[11px] font-bold ${getSportColorClass(r.sport)}`}>{r.sport}</span>
                            </td>
                            <td className="px-4 py-3 text-right font-mono text-sm text-gray-700">{r.distanceRaw}</td>
                            <td className="px-4 py-3 text-right font-mono text-sm text-gray-700">{r.timeRaw}</td>
                            <td className="px-4 py-3">
                              {r.isTooFast ? (
                                <div className="bg-red-50 rounded-lg p-2 border border-red-100">
                                  <span className="flex items-center gap-1 text-red-600 font-bold text-xs">
                                    <i data-lucide="alert-circle" className="w-3.5 h-3.5"></i>標記異常
                                  </span>
                                  <span className="text-[10px] text-red-500 block mt-0.5">{r.reason}</span>
                                </div>
                              ) : (
                                <span className="inline-flex items-center gap-1 text-emerald-600 font-semibold text-xs bg-emerald-50 px-2.5 py-1 rounded-full border border-emerald-100">
                                  <i data-lucide="check-circle-2" className="w-3 h-3"></i>正常
                                </span>
                              )}
                            </td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  ) : (
                    <table className="w-full text-left border-collapse min-w-max">
                      <thead className="sticky top-0 z-20">
                        <tr className="bg-indigo-50/80 text-gray-600 text-xs uppercase tracking-wide border-b border-indigo-100">
                          <th className="px-5 py-3 font-semibold">ID</th>
                          <th className="px-5 py-3 font-semibold">姓名</th>
                          <th className="px-5 py-3 font-semibold text-right">🏃 跑步 (km)</th>
                          <th className="px-5 py-3 font-semibold text-right">🚴 單車 (km)</th>
                          <th className="px-5 py-3 font-semibold text-right">🏊 游泳 (km)</th>
                          <th className="px-5 py-3 font-semibold text-right">🚶 健走 (km)</th>
                          <th className="px-5 py-3 font-semibold text-right">總里程 (km)</th>
                        </tr>
                      </thead>
                      <tbody>
                        {loading ? (
                          <tr><td colSpan="7" className="px-6 py-16 text-center"><div className="loader ease-linear rounded-full border-4 border-gray-200 border-t-indigo-500 h-10 w-10 mx-auto"></div></td></tr>
                        ) : summaryRecords.length === 0 ? (
                          <tr><td colSpan="7" className="px-6 py-16 text-center text-gray-400 text-sm">查無統計資料</td></tr>
                        ) : summaryRecords.map((rec, i) => (
                          <tr key={rec.id} className={`border-b border-gray-50 hover:bg-indigo-50/40 ${i % 2 === 1 ? 'bg-gray-50/40' : 'bg-white'}`}>
                            <td className="px-5 py-3.5 font-semibold text-gray-700 text-sm">{rec.id}</td>
                            <td className="px-5 py-3.5 font-semibold text-indigo-600 text-sm">{rec.realName}</td>
                            <td className="px-5 py-3.5 text-right font-mono text-sm text-emerald-700">{rec.run > 0 ? rec.run.toFixed(2) : <span className="text-gray-300">—</span>}</td>
                            <td className="px-5 py-3.5 text-right font-mono text-sm text-violet-700">{rec.bike > 0 ? rec.bike.toFixed(2) : <span className="text-gray-300">—</span>}</td>
                            <td className="px-5 py-3.5 text-right font-mono text-sm text-sky-700">{rec.swim > 0 ? rec.swim.toFixed(2) : <span className="text-gray-300">—</span>}</td>
                            <td className="px-5 py-3.5 text-right font-mono text-sm text-amber-700">{rec.walk > 0 ? rec.walk.toFixed(2) : <span className="text-gray-300">—</span>}</td>
                            <td className="px-5 py-3.5 text-right font-bold font-mono text-indigo-700 bg-indigo-50/50 text-sm">{rec.total.toFixed(2)}</td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  )}
                </div>
              </div>
            )}

          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
    setTimeout(() => { if (window.lucide) window.lucide.createIcons(); }, 100);
  </script>
</body>

</html>
